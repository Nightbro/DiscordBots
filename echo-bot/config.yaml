bot:
  name: Echo
  prefix: "!"
  color: 0x5865F2
  emojis:
    "yes": "✅"
    "no": "❌"
    music: "🎵"
    speaking: "🔊"
    loading: "⏳"

audio:
  panel_timeout: 300
  max_queue: 100
  auto_join: false   # join a voice channel when the first person enters it
  auto_leave: true   # leave when the last person exits the bot's channel

intros:
  on_bot_join: false   # play the user's intro when the bot joins their channel
  on_user_join: true   # play a user's intro when they join a voice channel

tts:
  default_voice: "en-US-AriaNeural"
  default_rate: "+0%"
